<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Diagramme de classes UML</title>
<style>
  body { margin: 0; background: #1a1a1a; display: flex; justify-content: center; padding: 20px; box-sizing: border-box; }
  svg { max-width: 860px; width: 100%; height: auto; display: block; }
</style>
</head>
<body>
<!--
  LAYOUT (y positions):
  y=30   : Utilisateur
  y=285  : Enseignant | Apprenant | Administrateur
  y=590  : Cours (gauche) | Evaluation (droite, x=360)
  y=870  : [espace 100px entre Cours bas=810 et Module haut=970]
  y=970  : Module (gauche, x=20) — Certification (droite, x=360) [classe-association]
  y=1250 : Exercice
-->
<svg viewBox="0 0 820 2050" xmlns="http://www.w3.org/2000/svg" style="background:#1a1a1a;font-family:Arial,sans-serif;">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#9c9a92" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="inherit" viewBox="0 0 14 14" refX="12" refY="7" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
    <path d="M1 1L12 7L1 13Z" fill="none" stroke="#9c9a92" stroke-width="1.2"/>
  </marker>
  <marker id="diamond-filled" viewBox="0 0 20 10" refX="1" refY="5" markerWidth="13" markerHeight="13" orient="auto-start-reverse">
    <polygon points="0,5 9,0 18,5 9,10" fill="#9c9a92" stroke="#9c9a92" stroke-width="0.5"/>
  </marker>
  <!-- Losange pointant vers le bas côté Module -->
  <marker id="diamond-down" viewBox="0 0 10 20" refX="5" refY="19" markerWidth="13" markerHeight="13" orient="auto">
    <polygon points="5,0 10,9 5,18 0,9" fill="#9c9a92" stroke="#9c9a92" stroke-width="0.5"/>
  </marker>
</defs>

<!-- ================================================================
     UTILISATEUR  (centre x=290, y=30..205)
     ================================================================ -->
<rect x="170" y="30" width="240" height="175" rx="4" fill="#3C3489" stroke="#AFA9EC" stroke-width="1"/>
<rect x="170" y="30" width="240" height="26" rx="4" fill="#26215C" stroke="none"/>
<rect x="170" y="54"  width="240" height="2" fill="#AFA9EC" opacity="0.4"/>
<text font-size="14" font-weight="bold" fill="#CECBF6" x="290" y="43" text-anchor="middle" dominant-baseline="central">Utilisateur</text>
<text font-size="11" fill="#AFA9EC" x="180" y="68"  dominant-baseline="central">+int id</text>
<text font-size="11" fill="#AFA9EC" x="180" y="84"  dominant-baseline="central">+string nom</text>
<text font-size="11" fill="#AFA9EC" x="180" y="100" dominant-baseline="central">+string prenom</text>
<text font-size="11" fill="#AFA9EC" x="180" y="116" dominant-baseline="central">+date date_naissance</text>
<text font-size="11" fill="#AFA9EC" x="180" y="132" dominant-baseline="central">+string email</text>
<text font-size="11" fill="#AFA9EC" x="180" y="148" dominant-baseline="central">+string mot_de_passe</text>
<text font-size="11" fill="#AFA9EC" x="180" y="164" dominant-baseline="central">+date date_inscription</text>
<rect x="170" y="178" width="240" height="2" fill="#AFA9EC" opacity="0.4"/>
<text font-size="11" fill="#AFA9EC" x="180" y="193" dominant-baseline="central">+sinscrire()  +seConnecter()  +modifierProfil()</text>

<!-- ================================================================
     ENSEIGNANT  (x=20, y=285..480)
     ================================================================ -->
<rect x="20" y="285" width="185" height="195" rx="4" fill="#085041" stroke="#5DCAA5" stroke-width="1"/>
<rect x="20" y="285" width="185" height="26"  rx="4" fill="#04342C" stroke="none"/>
<rect x="20" y="309" width="185" height="2"   fill="#5DCAA5" opacity="0.4"/>
<text font-size="13" font-weight="bold" fill="#9FE1CB" x="112" y="298" text-anchor="middle" dominant-baseline="central">Enseignant</text>
<text font-size="11" fill="#9FE1CB" x="30" y="323" dominant-baseline="central">+string specialite</text>
<text font-size="11" fill="#9FE1CB" x="30" y="339" dominant-baseline="central">+string biographie</text>
<text font-size="11" fill="#9FE1CB" x="30" y="355" dominant-baseline="central">+list cours_crees</text>
<rect x="20" y="369" width="185" height="2"   fill="#5DCAA5" opacity="0.4"/>
<text font-size="11" fill="#9FE1CB" x="30" y="383" dominant-baseline="central">+creerCours()</text>
<text font-size="11" fill="#9FE1CB" x="30" y="399" dominant-baseline="central">+evaluerApprenant()</text>
<text font-size="11" fill="#9FE1CB" x="30" y="415" dominant-baseline="central">+genererRapport()</text>

<!-- ================================================================
     APPRENANT  (x=235, y=285..495)
     ================================================================ -->
<rect x="235" y="285" width="200" height="210" rx="4" fill="#085041" stroke="#5DCAA5" stroke-width="1"/>
<rect x="235" y="285" width="200" height="26"  rx="4" fill="#04342C" stroke="none"/>
<rect x="235" y="309" width="200" height="2"   fill="#5DCAA5" opacity="0.4"/>
<text font-size="13" font-weight="bold" fill="#9FE1CB" x="335" y="298" text-anchor="middle" dominant-baseline="central">Apprenant</text>
<text font-size="11" fill="#9FE1CB" x="245" y="323" dominant-baseline="central">+string niveau_etude</text>
<text font-size="11" fill="#9FE1CB" x="245" y="339" dominant-baseline="central">+string objectif</text>
<text font-size="11" fill="#9FE1CB" x="245" y="355" dominant-baseline="central">+list parcours_suivis</text>
<text font-size="11" fill="#9FE1CB" x="245" y="371" dominant-baseline="central">+dict progression</text>
<rect x="235" y="385" width="200" height="2"   fill="#5DCAA5" opacity="0.4"/>
<text font-size="11" fill="#9FE1CB" x="245" y="399" dominant-baseline="central">+passerEvaluation()</text>
<text font-size="11" fill="#9FE1CB" x="245" y="415" dominant-baseline="central">+consulterReco.()</text>
<text font-size="11" fill="#9FE1CB" x="245" y="431" dominant-baseline="central">+telechargerCertificat()</text>

<!-- ================================================================
     ADMINISTRATEUR  (x=470, y=285..450)
     ================================================================ -->
<rect x="470" y="285" width="200" height="165" rx="4" fill="#085041" stroke="#5DCAA5" stroke-width="1"/>
<rect x="470" y="285" width="200" height="26"  rx="4" fill="#04342C" stroke="none"/>
<rect x="470" y="309" width="200" height="2"   fill="#5DCAA5" opacity="0.4"/>
<text font-size="13" font-weight="bold" fill="#9FE1CB" x="570" y="298" text-anchor="middle" dominant-baseline="central">Administrateur</text>
<text font-size="11" fill="#9FE1CB" x="480" y="323" dominant-baseline="central">+string niveau_acces</text>
<rect x="470" y="337" width="200" height="2"   fill="#5DCAA5" opacity="0.4"/>
<text font-size="11" fill="#9FE1CB" x="480" y="351" dominant-baseline="central">+gererUtilisateurs()</text>
<text font-size="11" fill="#9FE1CB" x="480" y="367" dominant-baseline="central">+configurerSysteme()</text>
<text font-size="11" fill="#9FE1CB" x="480" y="383" dominant-baseline="central">+voirLogs()</text>

<!-- ================================================================
     COURS  (x=20, y=590..810)
     ================================================================ -->
<rect x="20" y="590" width="200" height="220" rx="4" fill="#0C447C" stroke="#85B7EB" stroke-width="1"/>
<rect x="20" y="590" width="200" height="26"  rx="4" fill="#042C53" stroke="none"/>
<rect x="20" y="614" width="200" height="2"   fill="#85B7EB" opacity="0.4"/>
<text font-size="13" font-weight="bold" fill="#B5D4F4" x="120" y="603" text-anchor="middle" dominant-baseline="central">Cours</text>
<text font-size="11" fill="#B5D4F4" x="30" y="628" dominant-baseline="central">+int id_cours</text>
<text font-size="11" fill="#B5D4F4" x="30" y="644" dominant-baseline="central">+string titre</text>
<text font-size="11" fill="#B5D4F4" x="30" y="660" dominant-baseline="central">+string description</text>
<text font-size="11" fill="#B5D4F4" x="30" y="676" dominant-baseline="central">+int niveau_difficulte</text>
<text font-size="11" fill="#B5D4F4" x="30" y="692" dominant-baseline="central">+float duree</text>
<text font-size="11" fill="#B5D4F4" x="30" y="708" dominant-baseline="central">+list modules</text>
<rect x="20" y="722" width="200" height="2"   fill="#85B7EB" opacity="0.4"/>
<text font-size="11" fill="#B5D4F4" x="30" y="736" dominant-baseline="central">+ajouterModule()</text>
<text font-size="11" fill="#B5D4F4" x="30" y="752" dominant-baseline="central">+modifierContenu()</text>
<text font-size="11" fill="#B5D4F4" x="30" y="768" dominant-baseline="central">+publier()</text>

<!-- ================================================================
     EVALUATION  (x=360, y=590..800)
     ================================================================ -->
<rect x="360" y="590" width="210" height="210" rx="4" fill="#0C447C" stroke="#85B7EB" stroke-width="1"/>
<rect x="360" y="590" width="210" height="26"  rx="4" fill="#042C53" stroke="none"/>
<rect x="360" y="614" width="210" height="2"   fill="#85B7EB" opacity="0.4"/>
<text font-size="13" font-weight="bold" fill="#B5D4F4" x="465" y="603" text-anchor="middle" dominant-baseline="central">Evaluation</text>
<text font-size="11" fill="#B5D4F4" x="370" y="628" dominant-baseline="central">+int id_evaluation</text>
<text font-size="11" fill="#B5D4F4" x="370" y="644" dominant-baseline="central">+date date_passation</text>
<text font-size="11" fill="#B5D4F4" x="370" y="660" dominant-baseline="central">+float score</text>
<text font-size="11" fill="#B5D4F4" x="370" y="676" dominant-baseline="central">+string commentaire</text>
<text font-size="11" fill="#B5D4F4" x="370" y="692" dominant-baseline="central">+dict reponses</text>
<rect x="360" y="706" width="210" height="2"   fill="#85B7EB" opacity="0.4"/>
<text font-size="11" fill="#B5D4F4" x="370" y="720" dominant-baseline="central">+calculerScore()</text>
<text font-size="11" fill="#B5D4F4" x="370" y="736" dominant-baseline="central">+genererFeedback()</text>

<!-- ================================================================
     MODULE  (x=20, y=1010..1205)
     — 200px d'espace après Cours (bas=810)
     ================================================================ -->
<rect x="20" y="1010" width="200" height="195" rx="4" fill="#0C447C" stroke="#85B7EB" stroke-width="1"/>
<rect x="20" y="1010" width="200" height="26"  rx="4" fill="#042C53" stroke="none"/>
<rect x="20" y="1034" width="200" height="2"   fill="#85B7EB" opacity="0.4"/>
<text font-size="13" font-weight="bold" fill="#B5D4F4" x="120" y="1023" text-anchor="middle" dominant-baseline="central">Module</text>
<text font-size="11" fill="#B5D4F4" x="30" y="1048" dominant-baseline="central">+int id_module</text>
<text font-size="11" fill="#B5D4F4" x="30" y="1064" dominant-baseline="central">+string titre</text>
<text font-size="11" fill="#B5D4F4" x="30" y="1080" dominant-baseline="central">+string type_contenu</text>
<text font-size="11" fill="#B5D4F4" x="30" y="1096" dominant-baseline="central">+string contenu</text>
<text font-size="11" fill="#B5D4F4" x="30" y="1112" dominant-baseline="central">+int ordre</text>
<rect x="20" y="1126" width="200" height="2"   fill="#85B7EB" opacity="0.4"/>
<text font-size="11" fill="#B5D4F4" x="30" y="1140" dominant-baseline="central">+ajouterExercice()</text>
<text font-size="11" fill="#B5D4F4" x="30" y="1156" dominant-baseline="central">+getProgression()</text>
<text font-size="11" fill="#B5D4F4" x="30" y="1172" dominant-baseline="central">+afficherContenu()</text>

<!-- ================================================================
     CERTIFICATION — Classe-association entre Evaluation et Module
     Boîte à droite (x=360, y=990)
     Ligne principale : Evaluation (bas centre ~465,800) → descend →
       puis horizontale vers Module (droite=220, milieu y≈1107)
     Losange orange au milieu de cette ligne
     Trait pointillé horizontal vers la boîte Certification
     ================================================================ -->

<!--
  Chemin de l'association :
    départ : bas de Evaluation  → (465, 800)
    coude   → (465, 910) → horizontal → (220, 910)
    descend → (220, 1107) : milieu de Module côté droit
-->
<path d="M465 800 L465 910 L220 910 L220 1107"
      fill="none" stroke="#9c9a92" stroke-width="1.2" stroke-dasharray="6 3"/>

<!-- Cardinalité côté Evaluation (1..*) -->
<rect x="472" y="803" width="28" height="14" rx="2" fill="#1a1a1a"/>
<text font-size="11" font-weight="bold" fill="#EF9F27" x="486" y="810" text-anchor="middle" dominant-baseline="central">1..*</text>

<!-- Cardinalité côté Module (1..*) -->
<rect x="225" y="1090" width="28" height="14" rx="2" fill="#1a1a1a"/>
<text font-size="11" font-weight="bold" fill="#EF9F27" x="239" y="1097" text-anchor="middle" dominant-baseline="central">1..*</text>

<!-- Losange orange au milieu de la ligne (sur le coude horizontal, x=342, y=910) -->
<polygon points="342,902 352,910 342,918 332,910" fill="#EF9F27" stroke="#EF9F27" stroke-width="1"/>

<!-- Trait pointillé du losange vers la boîte Certification -->
<line x1="342" y1="910" x2="342" y2="990" fill="none" stroke="#EF9F27" stroke-width="1.3" stroke-dasharray="5 3"/>

<!-- ======= CERTIFICATION (classe-association) ======= -->
<!-- x=250, y=990, width=230 -->
<rect x="250" y="990" width="235" height="160" rx="4" fill="#633806" stroke="#EF9F27" stroke-width="1.8"/>
<rect x="250" y="990" width="235" height="28"  rx="4" fill="#412402" stroke="none"/>
<rect x="250" y="1018" width="235" height="1.5" fill="#EF9F27" opacity="0.5"/>
<text font-size="12" font-weight="bold" fill="#FAC775" x="367" y="1004" text-anchor="middle" dominant-baseline="central">«classe-association»</text>
<text font-size="13" font-weight="bold" fill="#FAC775" x="367" y="1025" text-anchor="middle" dominant-baseline="central">Certification</text>
<line x1="250" y1="1036" x2="485" y2="1036" stroke="#EF9F27" stroke-width="0.8" opacity="0.4"/>
<text font-size="11" fill="#FAC775" x="262" y="1052" dominant-baseline="central">+int id_certificat</text>
<text font-size="11" fill="#FAC775" x="262" y="1068" dominant-baseline="central">+date date_emission</text>
<text font-size="11" fill="#FAC775" x="262" y="1084" dominant-baseline="central">+string code_validation</text>
<rect x="250" y="1098" width="235" height="2"   fill="#EF9F27" opacity="0.4"/>
<text font-size="11" fill="#FAC775" x="262" y="1114" dominant-baseline="central">+genererPDF()</text>
<text font-size="11" fill="#FAC775" x="262" y="1130" dominant-baseline="central">+verifierAuthenticite()</text>

<!-- ================================================================
     EXERCICE  (x=20, y=1330..1495)
     — 130px d'espace après Module (bas=1205)
     ================================================================ -->
<rect x="20" y="1330" width="200" height="165" rx="4" fill="#0C447C" stroke="#85B7EB" stroke-width="1"/>
<rect x="20" y="1330" width="200" height="26"  rx="4" fill="#042C53" stroke="none"/>
<rect x="20" y="1354" width="200" height="2"   fill="#85B7EB" opacity="0.4"/>
<text font-size="13" font-weight="bold" fill="#B5D4F4" x="120" y="1343" text-anchor="middle" dominant-baseline="central">Exercice</text>
<text font-size="11" fill="#B5D4F4" x="30" y="1368" dominant-baseline="central">+int id_exercice</text>
<text font-size="11" fill="#B5D4F4" x="30" y="1384" dominant-baseline="central">+string type</text>
<text font-size="11" fill="#B5D4F4" x="30" y="1400" dominant-baseline="central">+string enonce</text>
<text font-size="11" fill="#B5D4F4" x="30" y="1416" dominant-baseline="central">+int difficulte</text>
<text font-size="11" fill="#B5D4F4" x="30" y="1432" dominant-baseline="central">+float score_minimum</text>
<rect x="20" y="1446" width="200" height="2"   fill="#85B7EB" opacity="0.4"/>
<text font-size="11" fill="#B5D4F4" x="30" y="1460" dominant-baseline="central">+valider()</text>

<!-- ================================================================
     HÉRITAGE — les 3 sous-classes → Utilisateur
     ================================================================ -->
<!-- Ligne horizontale commune y=260 -->
<path d="M112 285 L112 258 L290 258 L290 205" fill="none" stroke="#9c9a92" stroke-width="1" marker-end="url(#inherit)"/>
<path d="M335 285 L335 258 L290 258 L290 205" fill="none" stroke="#9c9a92" stroke-width="1" marker-end="url(#inherit)"/>
<path d="M570 285 L570 258 L290 258 L290 205" fill="none" stroke="#9c9a92" stroke-width="1" marker-end="url(#inherit)"/>

<!-- ================================================================
     ENSEIGNANT --cree--> COURS  (1 → 1..*)
     ================================================================ -->
<line x1="112" y1="480" x2="112" y2="590" stroke="#9c9a92" stroke-width="1" marker-end="url(#arrow)"/>
<text font-size="11" fill="#9c9a92" x="120" y="535" dominant-baseline="central">cree</text>
<rect x="117" y="483" width="20" height="14" rx="2" fill="#1a1a1a"/>
<text font-size="11" font-weight="bold" fill="#EF9F27" x="127" y="490" text-anchor="middle" dominant-baseline="central">1</text>
<rect x="117" y="568" width="28" height="14" rx="2" fill="#1a1a1a"/>
<text font-size="11" font-weight="bold" fill="#EF9F27" x="131" y="575" text-anchor="middle" dominant-baseline="central">1..*</text>

<!-- ================================================================
     APPRENANT --suit--> COURS  (* → *)
     ================================================================ -->
<path d="M295 495 L120 590" fill="none" stroke="#9c9a92" stroke-width="1" marker-end="url(#arrow)"/>
<text font-size="11" fill="#9c9a92" x="185" y="535" dominant-baseline="central">suit</text>
<rect x="278" y="488" width="18" height="14" rx="2" fill="#1a1a1a"/>
<text font-size="11" font-weight="bold" fill="#EF9F27" x="287" y="495" text-anchor="middle" dominant-baseline="central">*</text>
<rect x="122" y="578" width="18" height="14" rx="2" fill="#1a1a1a"/>
<text font-size="11" font-weight="bold" fill="#EF9F27" x="131" y="585" text-anchor="middle" dominant-baseline="central">*</text>

<!-- ================================================================
     APPRENANT --passe--> EVALUATION  (1 → 1..*)
     ================================================================ -->
<path d="M380 495 L465 590" fill="none" stroke="#9c9a92" stroke-width="1" marker-end="url(#arrow)"/>
<text font-size="11" fill="#9c9a92" x="430" y="535" dominant-baseline="central">passe</text>
<rect x="373" y="488" width="20" height="14" rx="2" fill="#1a1a1a"/>
<text font-size="11" font-weight="bold" fill="#EF9F27" x="383" y="495" text-anchor="middle" dominant-baseline="central">1</text>
<rect x="450" y="573" width="28" height="14" rx="2" fill="#1a1a1a"/>
<text font-size="11" font-weight="bold" fill="#EF9F27" x="464" y="580" text-anchor="middle" dominant-baseline="central">1..*</text>

<!-- ================================================================
     COURS --composition--> MODULE
     Losange PLEIN côté Cours (haut), flèche côté Module (bas)
     ================================================================ -->
<line x1="120" y1="812" x2="120" y2="998"
      stroke="#9c9a92" stroke-width="1.5"
      marker-end="url(#diamond-down)"/>
<text font-size="11" fill="#9c9a92" x="128" y="910" dominant-baseline="central">contient</text>
<!-- Cardinalité côté Cours (1) -->
<rect x="125" y="813" width="20" height="14" rx="2" fill="#1a1a1a"/>
<text font-size="11" font-weight="bold" fill="#EF9F27" x="135" y="820" text-anchor="middle" dominant-baseline="central">1</text>
<!-- Cardinalité côté Module (1..*) -->
<rect x="125" y="988" width="28" height="14" rx="2" fill="#1a1a1a"/>
<text font-size="11" font-weight="bold" fill="#EF9F27" x="139" y="995" text-anchor="middle" dominant-baseline="central">1..*</text>

<!-- ================================================================
     MODULE --propose--> EXERCICE  (1 → 1..*)
     ================================================================ -->
<line x1="120" y1="1205" x2="120" y2="1330" stroke="#9c9a92" stroke-width="1" marker-end="url(#arrow)"/>
<text font-size="11" fill="#9c9a92" x="128" y="1267" dominant-baseline="central">propose</text>
<rect x="125" y="1208" width="20" height="14" rx="2" fill="#1a1a1a"/>
<text font-size="11" font-weight="bold" fill="#EF9F27" x="135" y="1215" text-anchor="middle" dominant-baseline="central">1</text>
<rect x="125" y="1308" width="28" height="14" rx="2" fill="#1a1a1a"/>
<text font-size="11" font-weight="bold" fill="#EF9F27" x="139" y="1315" text-anchor="middle" dominant-baseline="central">1..*</text>

</svg>
</body>
</html>
